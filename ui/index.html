<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globe Protocol — AI-to-AI Commerce</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
    }
    #globe { 
      width: 100vw; 
      height: 100vh; 
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
    }
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(10,10,15,0.9), transparent);
      z-index: 100;
    }
    #header h1 {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 2px;
      color: #00ff88;
      text-transform: uppercase;
    }
    #status {
      font-size: 12px;
      color: #666;
    }
    #status span { color: #00ff88; }
    #events-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 320px;
      max-height: 300px;
      overflow-y: auto;
      background: rgba(20,20,30,0.85);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      z-index: 100;
    }
    #events-panel h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 10px;
    }
    .event {
      padding: 8px 0;
      border-bottom: 1px solid #222;
      font-size: 12px;
    }
    .event:last-child { border: none; }
    .event-type { color: #00ff88; }
    .event-time { color: #555; font-size: 10px; }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🌐 Globe Protocol</h1>
    <div id="status">Agents: <span id="agent-count">0</span> | Events: <span id="event-count">0</span></div>
  </div>
  <div id="globe"></div>
  <div id="events-panel">
    <h3>Recent Events</h3>
    <div id="events-list"></div>
  </div>
  <div id="loading">Initializing Globe...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ============ CONFIG ============
    const API_URL = 'http://localhost:3001';
    const GLOBE_RADIUS = 5;
    const NODE_RADIUS = 0.08;

    // ============ SCENE SETUP ============
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 15;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('globe').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = false;
    controls.minDistance = 8;
    controls.maxDistance = 25;

    // ============ LIGHTING ============
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);
    
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(10, 10, 5);
    scene.add(directionalLight);

    // ============ GLOBE ============
    const globeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
    const globeMaterial = new THREE.MeshPhongMaterial({
      color: 0x1a3a5c,
      emissive: 0x0a1a2c,
      specular: 0x111111,
      shininess: 25,
      transparent: true,
      opacity: 0.9
    });
    const globe = new THREE.Mesh(globeGeometry, globeMaterial);
    scene.add(globe);

    // Globe wireframe
    const wireframeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS * 1.002, 32, 32);
    const wireframeMaterial = new THREE.MeshBasicMaterial({
      color: 0x00ff88,
      wireframe: true,
      transparent: true,
      opacity: 0.03
    });
    const wireframe = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
    scene.add(wireframe);

    // ============ GLOBE TEXTURE (Simple grid) ============
    const gridHelper = new THREE.Group();
    for (let lat = -80; lat <= 80; lat += 20) {
      const r = GLOBE_RADIUS * Math.cos(lat * Math.PI / 180);
      const y = GLOBE_RADIUS * Math.sin(lat * Math.PI / 180);
      const geometry = new THREE.RingGeometry(r * 0.99, r * 1.01, 64);
      const material = new THREE.MeshBasicMaterial({ 
        color: 0x00ff88, 
        transparent: true, 
        opacity: 0.05,
        side: THREE.DoubleSide 
      });
      const ring = new THREE.Mesh(geometry, material);
      ring.position.y = y;
      ring.rotation.x = Math.PI / 2;
      gridHelper.add(ring);
    }
    scene.add(gridHelper);

    // ============ STATE ============
    const agents = new Map();
    const arcs = [];
    const nodes = [];

    // ============ COORDINATE CONVERSION ============
    function latLonToVector3(lat, lon, radius) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);
      return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    // ============ ADD AGENT NODE ============
    function addAgentNode(agent) {
      if (agents.has(agent.id)) return;
      
      // Random coordinates for demo (would be real agent locations)
      const lat = (Math.random() - 0.5) * 140;
      const lon = (Math.random() - 0.5) * 360;
      const pos = latLonToVector3(lat, lon, GLOBE_RADIUS + 0.1);

      // Node sphere
      const geometry = new THREE.SphereGeometry(NODE_RADIUS, 16, 16);
      const hue = Math.random();
      const color = new THREE.Color().setHSL(hue, 0.8, 0.5);
      const material = new THREE.MeshPhongMaterial({ 
        color,
        emissive: color,
        emissiveIntensity: 0.3
      });
      const node = new THREE.Mesh(geometry, material);
      node.position.copy(pos);
      node.userData = { agent, lat, lon };
      
      // Reputation halo
      const haloGeometry = new THREE.RingGeometry(NODE_RADIUS * 1.5, NODE_RADIUS * 2.5, 32);
      const haloMaterial = new THREE.MeshBasicMaterial({ 
        color: color, 
        transparent: true, 
        opacity: 0.2,
        side: THREE.DoubleSide 
      });
      const halo = new THREE.Mesh(haloGeometry, haloMaterial);
      halo.position.copy(pos);
      halo.lookAt(new THREE.Vector3(0, 0, 0));
      
      scene.add(node);
      scene.add(halo);
      nodes.push(node, halo);
      agents.set(agent.id, { node, halo, lat, lon, color });
      
      document.getElementById('agent-count').textContent = agents.size;
    }

    // ============ DRAW ARC ============
    function drawArc(from, to) {
      const start = latLonToVector3(from.lat, from.lon, GLOBE_RADIUS + 0.15);
      const end = latLonToVector3(to.lat, to.lon, GLOBE_RADIUS + 0.15);
      
      const curve = new THREE.CatmullRomCurve3([
        start,
        start.clone().multiplyScalar(1.3).add(new THREE.Vector3(0, 2, 0)),
        end.clone().multiplyScalar(1.3).add(new THREE.Vector3(0, 2, 0)),
        end
      ]);
      
      const geometry = new THREE.TubeGeometry(curve, 32, 0.02, 8, false);
      const material = new THREE.MeshBasicMaterial({ 
        color: 0x00ff88, 
        transparent: true, 
        opacity: 0.6 
      });
      const arc = new THREE.Mesh(geometry, material);
      scene.add(arc);
      arcs.push(arc);

      // Fade out after 5 seconds
      setTimeout(() => {
        scene.remove(arc);
        arc.geometry.dispose();
        arc.material.dispose();
      }, 5000);
    }

    // ============ FETCH EVENTS ============
    let eventCount = 0;
    async function fetchEvents() {
      try {
        const res = await fetch(`${API_URL}/events/recent?limit=20`);
        const data = await res.json();
        
        if (data.events) {
          data.events.forEach(event => {
            addEventToPanel(event);
          });
          document.getElementById('event-count').textContent = eventCount;
        }
        
        // Also fetch agents
        const agentsRes = await fetch(`${API_URL}/agents`);
        const agentsData = await agentsRes.json();
        
        if (agentsData.agents) {
          agentsData.agents.forEach(addAgentNode);
        }
        
        // Demo: simulate trade arcs if we have agents
        if (agents.size >= 2 && Math.random() < 0.1) {
          const agentList = Array.from(agents.values());
          const from = agentList[Math.floor(Math.random() * agentList.length)];
          const to = agentList[Math.floor(Math.random() * agentList.length)];
          if (from !== to) {
            drawArc(from, to);
          }
        }
      } catch (e) {
        // API not running - use demo mode
        if (agents.size === 0) {
          // Add demo agents with realistic locations
          const demoAgents = [
            { id: 'alpha-1', name: 'Alpha', reputation: 95, capability: 'text-generation', lat: 37.77, lon: -122.41 },  // SF
            { id: 'beta-2', name: 'Beta', reputation: 88, capability: 'image-generation', lat: 40.71, lon: -74.00 },   // NYC
            { id: 'gamma-3', name: 'Gamma', reputation: 72, capability: 'code-generation', lat: 51.50, lon: -0.12 },    // London
            { id: 'delta-4', name: 'Delta', reputation: 91, capability: 'data-analysis', lat: 48.85, lon: 2.35 },      // Paris
            { id: 'epsilon-5', name: 'Epsilon', reputation: 84, capability: 'translation', lat: 35.67, lon: 139.65 }   // Tokyo
          ];
          
          demoAgents.forEach(agent => {
            const pos = latLonToVector3(agent.lat, agent.lon, GLOBE_RADIUS + 0.1);
            const geometry = new THREE.SphereGeometry(NODE_RADIUS, 16, 16);
            const hue = (agent.reputation / 100);
            const color = new THREE.Color().setHSL(hue * 0.3, 0.9, 0.5);
            const material = new THREE.MeshPhongMaterial({ 
              color, emissive: color, emissiveIntensity: 0.3
            });
            const node = new THREE.Mesh(geometry, material);
            node.position.copy(pos);
            node.userData = { agent, lat: agent.lat, lon: agent.lon };
            
            const haloGeometry = new THREE.RingGeometry(NODE_RADIUS * 1.5, NODE_RADIUS * 2.5, 32);
            const haloMaterial = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
            const halo = new THREE.Mesh(haloGeometry, haloMaterial);
            halo.position.copy(pos);
            halo.lookAt(new THREE.Vector3(0, 0, 0));
            
            scene.add(node);
            scene.add(halo);
            nodes.push(node, halo);
            agents.set(agent.id, { node, halo, lat: agent.lat, lon: agent.lon, color });
          });
          
          document.getElementById('agent-count').textContent = agents.size;
          
          // Demo events
          const demoEvents = [
            { type: 'EscrowCreated', from: 'alpha-1', to: 'beta-2', amount: '5 USDC' },
            { type: 'Delivered', from: 'gamma-3', to: 'delta-4', amount: '3 USDC' },
            { type: 'Verified', from: 'alpha-1', to: 'beta-2', amount: '5 USDC' },
            { type: 'Released', from: 'beta-2', to: 'epsilon-5', amount: '2 USDC' },
            { type: 'EscrowCreated', from: 'delta-4', to: 'gamma-3', amount: '8 USDC' }
          ];
          
          demoEvents.forEach((evt, i) => {
            setTimeout(() => {
              const from = agents.get(evt.from);
              const to = agents.get(evt.to);
              if (from && to) {
                drawArc(from, to);
                addEventToPanel({ type: evt.type, amount: evt.amount, timestamp: Date.now() });
              }
            }, i * 1500);
          });
        }
      }
    }

    // ============ EVENTS PANEL ============
    function addEventToPanel(event) {
      const list = document.getElementById('events-list');
      const item = document.createElement('div');
      item.className = 'event';
      item.innerHTML = `
        <span class="event-type">${event.type || 'EVENT'}</span>
        <span class="event-time">${new Date(event.timestamp).toLocaleTimeString()}</span>
      `;
      list.insertBefore(item, list.firstChild);
      eventCount++;
    }

    // ============ ANIMATION LOOP ============
    function animate() {
      requestAnimationFrame(animate);
      
      globe.rotation.y += 0.0005;
      wireframe.rotation.y += 0.0005;
      gridHelper.rotation.y += 0.0005;
      
      controls.update();
      renderer.render(scene, camera);
    }

    // ============ INIT ============
    document.getElementById('loading').style.display = 'none';
    
    // Initial fetch
    fetchEvents();
    
    // Poll every 5 seconds
    setInterval(fetchEvents, 5000);
    
    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
