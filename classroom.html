<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework Hero - AI Classroom</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Fredoka', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 15px; }
    .header h1 { color: #fff; font-size: 2.8rem; font-weight: 700; text-shadow: 0 4px 20px rgba(233, 69, 96, 0.5); }
    .header h1 span { color: #e94560; }
    .subtitle { color: #7f8c8d; font-size: 1rem; margin-top: 5px; }
    .classroom { background: linear-gradient(180deg, #3d5a4a 0%, #2d4a3a 100%); border-radius: 25px; padding: 25px; box-shadow: 0 25px 80px rgba(0,0,0,0.6); position: relative; }
    .chalkboard { background: linear-gradient(180deg, #1a3a2a 0%, #0d1f17 100%); border: 10px solid #8b5a2b; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
    .chalkboard-title { color: #f4d03f; font-size: 1.1rem; font-weight: 600; text-align: center; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 4px; }
    .chalk-text { color: #ecf0f1; font-size: 1.2rem; text-align: center; min-height: 30px; }
    .floor { background: linear-gradient(180deg, #d4a574 0%, #c4956a 100%); border-radius: 15px; padding: 20px; min-height: 250px; position: relative; }
    .desks-container { display: flex; justify-content: space-around; align-items: flex-end; height: 140px; }
    .desk-group { display: flex; flex-direction: column; align-items: center; position: relative; }
    .student-spot { position: absolute; bottom: 50px; display: flex; flex-direction: column; align-items: center; transition: all 0.5s ease; }
    .student-spot.at-desk { bottom: 50px; }
    .student { cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s; }
    .student:hover { transform: scale(1.1); }
    .student-sprite { width: 50px; height: 50px; image-rendering: pixelated; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4)); }
    .student.walking .student-sprite { animation: bounce 0.2s infinite alternate; }
    .student.facing-left .student-sprite { transform: scaleX(-1); }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-3px); } }
    .status-badge { position: absolute; top: -22px; font-size: 0.65rem; font-weight: 600; padding: 3px 10px; border-radius: 15px; white-space: nowrap; }
    .status-idle { background: #27ae60; color: #fff; }
    .status-working { background: #f39c12; color: #fff; }
    .status-thinking { background: #e74c3c; color: #fff; animation: pulse 0.6s infinite; }
    .status-done { background: #3498db; color: #fff; }
    .status-walking { background: #9b59b6; color: #fff; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .student-name { font-size: 0.8rem; font-weight: 600; color: #2c3e50; margin-top: 3px; }
    .student-role { font-size: 0.6rem; color: #5d6d7e; }
    .desk { width: 80px; height: 45px; background: linear-gradient(180deg, #f5deb3 0%, #deb887 100%); border: 3px solid #8b4513; border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .desk-label { font-size: 0.55rem; font-weight: 700; color: #8b4513; text-transform: uppercase; }
    .desk-legs { display: flex; justify-content: space-between; width: 60%; margin-top: -2px; }
    .desk-leg { width: 10px; height: 25px; background: #6b4423; border-radius: 0 0 3px 3px; }
    .document { position: absolute; font-size: 22px; z-index: 30; transition: all 0.5s ease; }
    .document.hidden { opacity: 0; }
    .controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
    .btn { background: linear-gradient(180deg, #e94560 0%, #c23a51 100%); border: none; padding: 12px 28px; font-family: 'Fredoka', sans-serif; font-size: 1rem; font-weight: 600; color: #fff; border-radius: 25px; cursor: pointer; box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4); transition: all 0.3s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(233, 69, 96, 0.5); }
    .btn-secondary { background: linear-gradient(180deg, #3498db 0%, #2980b9 100%); box-shadow: 0 5px 20px rgba(52, 152, 219, 0.4); }
    .stats { position: absolute; top: 15px; right: 15px; }
    .stat-box { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; color: #fff; font-weight: 600; }
    .stat-box span { color: #e94560; }
    .pipeline-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); border: 3px solid #e94560; border-radius: 15px; padding: 15px 25px; display: none; z-index: 50; }
    .pipeline-bar.active { display: block; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    .pipeline-title { color: #fff; font-size: 0.9rem; text-align: center; margin-bottom: 10px; }
    .pipeline-steps { display: flex; gap: 8px; align-items: center; }
    .pipeline-step { padding: 6px 12px; border-radius: 15px; font-size: 0.7rem; background: #34495e; color: #7f8c8d; }
    .pipeline-step.active { background: #f39c12; color: #fff; transform: scale(1.1); }
    .pipeline-step.done { background: #27ae60; color: #fff; }
    .pipeline-arrow { color: #7f8c8d; }
    .chat-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
    .chat-overlay.open { display: flex; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .chat-box { width: 90%; max-width: 480px; background: #fff; border-radius: 20px; overflow: hidden; }
    .chat-header { background: linear-gradient(135deg, #e94560, #c23a51); color: #fff; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
    .chat-header h3 { font-size: 1.2rem; }
    .close-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; }
    .chat-messages { height: 280px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; }
    .message { padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; max-width: 80%; }
    .message.teacher { background: #e8f5e9; border: 2px solid #27ae60; align-self: flex-start; }
    .message.user { background: #e3f2fd; border: 2px solid #3498db; align-self: flex-end; }
    .message.system { background: #f5f5f5; border: 2px solid #bdc3c7; align-self: center; font-style: italic; }
    .message.thinking { background: #fff3e0; border: 2px solid #f39c12; align-self: center; }
    .typing-dots { display: flex; gap: 4px; padding: 5px; }
    .typing-dot { width: 8px; height: 8px; background: #f39c12; border-radius: 50%; animation: typing 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; } .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .chat-input-area { display: flex; border-top: 1px solid #eee; }
    .chat-input { flex: 1; padding: 15px; font-family: 'Fredoka', sans-serif; font-size: 1rem; border: none; outline: none; }
    .chat-send { background: #e94560; border: none; color: #fff; padding: 15px 22px; font-family: 'Fredoka', sans-serif; font-weight: 600; cursor: pointer; }
    .result-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 150; }
    .result-modal.open { display: flex; }
    .result-box { background: #fff; border-radius: 20px; width: 90%; max-width: 650px; max-height: 75vh; overflow: hidden; }
    .result-header { background: linear-gradient(135deg, #27ae60, #1e8449); color: #fff; padding: 22px; text-align: center; }
    .result-header h2 { margin-bottom: 5px; }
    .result-content { padding: 20px; max-height: 45vh; overflow-y: auto; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; }
    .result-footer { padding: 15px; border-top: 1px solid #eee; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>Homework <span>Hero</span></h1><p class="subtitle">AI-Powered Assignment Assistant</p></div>
    <div class="classroom">
      <div class="stats"><div class="stat-box">Assignments: <span id="passCount">0</span></div></div>
      <div class="chalkboard"><div class="chalkboard-title">Current Assignment</div><div class="chalk-text" id="chalkText">Click any student to get started!</div></div>
      <div class="floor" id="floor"><div class="desks-container" id="desksContainer"></div><div class="document hidden" id="document">&#128196;</div></div>
    </div>
    <div class="controls"><button class="btn" onclick="startAssignment()">New Assignment</button><button class="btn btn-secondary" onclick="resetClassroom()">Reset</button></div>
  </div>
  <div class="chat-overlay" id="chatOverlay">
    <div class="chat-box">
      <div class="chat-header"><h3 id="chatTitle">Chat</h3><button class="close-btn" onclick="closeChat()">X</button></div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area"><input type="text" class="chat-input" id="chatInput" placeholder="What do you need?" onkeypress="if(event.key==='Enter')sendMessage()"><button class="chat-send" onclick="sendMessage()">Send</button></div>
    </div>
  </div>
  <div class="result-modal" id="resultModal">
    <div class="result-box"><div class="result-header"><h2>Assignment Complete!</h2><p>Your essay is ready!</p></div><div class="result-content" id="resultContent"></div><div class="result-footer"><button class="btn" onclick="closeResult()">Great!</button></div></div>
  </div>
  <div class="pipeline-bar" id="pipelineBar"><div class="pipeline-title">Processing Assignment</div><div class="pipeline-steps" id="pipelineSteps"></div></div>
  <script>
    const API = 'http://localhost:3000/api';
    const students = [
      {id:'teacher',name:'Ms. Owl',sprite:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/164.png',role:'Teacher',task:'I create essays!'},
      {id:'organizer',name:'Pikachu',sprite:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png',role:'Organizer',task:'I organize content!'},
      {id:'humanizer',name:'Jigglypuff',sprite:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/39.png',role:'Humanizer',task:'I make it natural!'},
      {id:'aicheck',name:'Mewtwo',sprite:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/150.png',role:'AI Checker',task:'I detect AI writing!'},
      {id:'reviewer',name:'Professor',sprite:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/122.png',role:'Reviewer',task:'Final polish!'}
    ];
    let states = {}, curStu = null, curDoc = null, count = 0, active = false, desks = [], walkInt = null;
    students.forEach(s => states[s.id] = {status:'idle',x:0,y:0});
    function render() {
      const c = document.getElementById('desksContainer');
      c.innerHTML = '';
      students.forEach((s,i) => {
        c.innerHTML += `<div class="desk-group"><div class="student-spot at-desk" id="spot-${s.id}"><div class="student" id="stu-${s.id}" onclick="openChat('${s.id}')"><div class="status-badge status-idle" id="stat-${s.id}">Idle</div><img src="${s.sprite}" class="student-sprite"/><div class="student-name">${s.name}</div><div class="student-role">${s.role}</div></div></div><div class="desk"><span class="desk-label">${s.role}</span></div><div class="desk-legs"><div class="desk-leg"></div><div class="desk-leg"></div></div></div>`;
      });
      setTimeout(() => {
        desks = students.map(s => {
          const p = document.getElementById('spot-'+s.id).getBoundingClientRect();
          const f = document.getElementById('floor').getBoundingClientRect();
          return {x: p.left - f.left + 10};
        });
      }, 100);
    }
    function walk() {
      if (walkInt) return;
      walkInt = setInterval(() => {
        if (active) return;
        students.forEach((s,i) => {
          if (states[s.id].status !== 'idle') return;
          if (Math.random() < 0.08) {
            const spot = document.getElementById('spot-'+s.id), el = document.getElementById('stu-'+s.id), stat = document.getElementById('stat-'+s.id);
            const d = desks[i]||{x:i*140+60}, off = (Math.random()-0.5)*80;
            const tx = Math.max(10,Math.min(750,d.x+off));
            states[s.id].x = tx;
            spot.style.position = 'absolute'; spot.style.left = tx+'px'; spot.style.bottom = 'auto'; spot.style.top = '20px';
            spot.classList.remove('at-desk'); el.classList.add('walking');
            if(off<0) el.classList.add('facing-left'); else el.classList.remove('facing-left');
            stat.className = 'status-badge status-walking'; stat.textContent = 'Walking';
            setTimeout(() => {
              states[s.id].x = 0; spot.style.cssText = ''; spot.classList.add('at-desk'); el.classList.remove('walking','facing-left');
              stat.className = 'status-badge status-idle'; stat.textContent = 'Idle';
            }, 1500+Math.random()*1500);
          }
        });
      }, 600);
    }
    function setStat(id, st) {
      states[id].status = st;
      const el = document.getElementById('stat-'+id);
      if(el){ el.className = 'status-badge status-'+st; el.textContent = st.charAt(0).toUpperCase()+st.slice(1); }
      if(st==='working'||st==='thinking'){
        const spot = document.getElementById('spot-'+id), stu = document.getElementById('stu-'+id);
        spot.style.cssText = ''; spot.classList.add('at-desk');
        stu.classList.remove('walking','facing-left');
      }
    }
    async function pass(from, to) {
      const doc = document.getElementById('document'), fS = document.getElementById('spot-'+students[from].id), tS = document.getElementById('spot-'+students[to].id);
      const fR = fS.getBoundingClientRect(), tR = tS.getBoundingClientRect(), fl = document.getElementById('floor').getBoundingClientRect();
      const sx = fR.left-fl.left+15, ex = tR.left-fl.left+15;
      doc.style.left = sx+'px'; doc.style.top = '35px'; doc.classList.remove('hidden');
      setStat(students[from].id,'walking');
      fS.style.position = 'absolute'; fS.style.left = sx+'px'; fS.style.bottom = 'auto'; fS.style.top = '25px';
      fS.classList.remove('at-desk');
      const stu = document.getElementById('stu-'+students[from].id); stu.classList.add('walking');
      if(ex<sx) stu.classList.add('facing-left');
      for(let i=0;i<=20;i++){
        const p = i/20, e = p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
        fS.style.left = (sx+(ex-sx)*e)+'px'; doc.style.left = (sx+(ex-sx)*e+12)+'px';
        await new Promise(r=>requestAnimationFrame(r));
      }
      await new Promise(r=>setTimeout(r,150)); doc.classList.add('hidden');
      await new Promise(r=>setTimeout(r,200));
      fS.style.cssText = ''; fS.classList.add('at-desk'); stu.classList.remove('walking','facing-left');
      setStat(students[from].id,'idle');
    }
    function openChat(id){if(active)return;curStu=students.find(s=>s.id===id);document.getElementById('chatTitle').textContent='Chat with '+curStu.name;document.getElementById('chatOverlay').classList.add('open');document.getElementById('chatInput').focus();document.getElementById('chatMessages').innerHTML='<div class="message teacher">Hi! I\'m '+curStu.name+'! '+curStu.task+'<br><br><b>What do you need?</b></div>';}
    function closeChat(){document.getElementById('chatOverlay').classList.remove('open');curStu=null;}
    function closeResult(){document.getElementById('resultModal').classList.remove('open');}
    async function sendMessage(){
      const inp = document.getElementById('chatInput'), txt = inp.value.trim();
      if(!txt||!curStu) return;
      const msgs = document.getElementById('chatMessages');
      const um = document.createElement('div'); um.className='message user'; um.textContent=txt; msgs.appendChild(um); inp.value=''; msgs.scrollTop=msgs.scrollHeight;
      const th = document.createElement('div'); th.className='message thinking'; th.innerHTML='<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>'; msgs.appendChild(th); msgs.scrollTop=msgs.scrollHeight;
      setStat(curStu.id,'thinking');
      try{
        const res = await fetch(API+'/classroom/'+curStu.id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:txt,document:curDoc,passCount:count})});
        const data = await res.json(); th.remove();
        if(data.response){
          const am = document.createElement('div'); am.className='message teacher'; am.textContent = data.response; msgs.appendChild(am);
          if(curStu.id==='teacher'){curDoc=data.response;setTimeout(()=>{closeChat();runPipeline();},1200);}
        }
        setStat(curStu.id,'idle');
      }catch(e){th.remove();setStat(curStu.id,'idle');msgs.innerHTML+='<div class="message system">API Error!</div>';}
      msgs.scrollTop=msgs.scrollHeight;
    }
    async function runPipeline(){
      if(!curDoc) return;
      active=true; count++; document.getElementById('passCount').textContent=count;
      const chalk = document.getElementById('chalkText'), bar = document.getElementById('pipelineBar'), steps = document.getElementById('pipelineSteps');
      chalk.textContent = 'Processing Assignment #'+count+'...'; bar.classList.add('active');
      const p = ['teacher','organizer','humanizer','aicheck','reviewer'];
      for(let i=0;i<p.length;i++){
        const sid = p[i], stu = students.find(s=>s.id===sid);
        steps.innerHTML = p.map((x,j)=>`<span class="pipeline-step ${j<i?'done':j===i?'active':''}">${students[j].name}</span>`).join('<span class="pipeline-arrow">-></span>');
        setStat(sid,'working'); chalk.textContent = stu.name+' is working...'; await new Promise(r=>setTimeout(r,1200));
        if(sid!=='teacher'){
          try{const r=await fetch(API+'/classroom/'+sid,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Process',document:curDoc,passCount:count})});const d=await r.json();if(d.response)curDoc=d.response;}catch(e){}
        }
        setStat(sid,'done');
        if(i<p.length-1){chalk.textContent = stu.name+' passing to '+students[i+1].name+'...'; await pass(i,i+1);}
        if(sid==='aicheck'&&Math.random()>.7){chalk.textContent='AI detected! Returning...';await pass(i,2);i=1;}
      }
      chalk.textContent = 'Assignment #'+count+' Complete!'; bar.classList.remove('active');
      document.getElementById('resultContent').textContent = curDoc; document.getElementById('resultModal').classList.add('open');
      active=false; students.forEach(s=>setStat(s.id,'idle'));
    }
    function resetClassroom(){curDoc=null;count=0;active=false;document.getElementById('passCount').textContent='0';document.getElementById('chalkText').textContent='Click any student!';document.getElementById('pipelineBar').classList.remove('active');students.forEach(s=>setStat(s.id,'idle'));}
    render(); walk();
  </script>
</body>
</html>
